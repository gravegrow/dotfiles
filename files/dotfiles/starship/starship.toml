"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$directory\
$git_branch\
$git_commit\
$git_sate\
$python\
$c\
$cpp\
$dotnet\
$lua
$sudo$jobs$status$character
"""

add_newline = false

[fill]
symbol = 'Ôò┤'

[status]
format = '[\[$status\] ]($style)'
style = 'red'
disabled = false

[sudo]
disabled = false
style = 'yellow'
format = '[$symbol ]($style)'
symbol = '¾▒ªÜ'

[jobs]
symbol = '¾▒üñ'

[directory]
truncation_length = 4
read_only = "¾░ªØ "
style = 'bold blue'
format = '[$read_only]($read_only_style)[´ü╝ $path]($style)'

[git_branch]
format = ' [´üí](bold black) [$symbol$branch(:$remote_branch)]($style)'
style = "bold green"

[git_commit]
format = ' [\($hash$tag\)]($style)'
style = "red"

[python]
format = ' [´üí](bold black) [${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "¯£╝"

[dotnet]
format = ' [´üí](bold black) [$symbol ($version )($tfm )]($style)'
version_format = 'v${major}.${minor}'
symbol = '¯Öê'

[c]
style = 'blue'
commands = [ [ 'clang', '--version' ], [ 'cc', '--version' ], [ 'gcc', '--version' ] ]
format = ' [´üí](bold black) [$symbol $name $version]($style)'
version_format = 'v${major}.${minor}'
symbol = '¯ÿ×'

[cpp]
disabled = false
style = 'blue'
commands = [ [ 'clang++', '--version' ], [ 'c++', '--version' ], [ 'g++', '--version' ] ]
format = ' [´üí](bold black) [$symbol $name $version]($style)'
version_format = 'v${major}.${minor}'
symbol = '¯ÿØ'

[lua]
format = ' [´üí](bold black) [$symbol ($version )]($style)'
version_format = 'v${major}.${minor}'
symbol = '¯ÿá'
