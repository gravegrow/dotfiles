set-option -s escape-time 0
set-option -g history-limit 50000
set-option -g display-time 4000
set-option -g status-interval 5
set-option -g focus-events on

set-window-option -g mode-keys vi
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",*:Tc"
set -gq allow-passthrough on

set -g pane-base-index 1
set -g base-index 1
set -g mouse on
set -g renumber-windows on

set-window-option -g window-status-separator ""

set -g mode-style "bg=#1A1A1A"

set -g pane-border-style "fg=colour8 bg=terminal"
set -g pane-active-border-style "bg=terminal fg=#D27E99"

set -g status-position top
set -g status-justify left

set -g status-bg "color0"
set -g status-fg "color15"

set -g status-left "#[fg=terminal] 󰺪 "
set -g status-right "#[fg=terminal, bold] #{session_name}#[fg=color1]  "
set -g window-status-current-format "#[fg=color4, bg=default, bold] #I "
set -g window-status-format "#[fg=color238, bg=default] #I "

set -g message-style "fg=terminal bg=color0 bold"
set -g message-command-style "fg=terminal bg=black bold dim"

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g status-left-length 50
set -g status-right-length 50

source-file ~/.config/tmux/keybinds.conf
