font_size         19.0
modify_font       cell_height +10px
modify_font       underline_thickness -2px
disable_ligatures cursor

font_family      Berkeley Mono
italic_font      Berkeley Mono Condensed Oblique
bold_italic_font auto

symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d4,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f532,U+f0001-U+f1af0 JetBrainsMono Nerd Font Mono

window_padding_width 10

foreground #9A8F8A
background #101010

color0  #0A0A0A
color1  #945B5B
color2  #737c73
color3  #B7927B
color4  #627691
color5  #be8c8c
color6  #8EA4A2
color7  #696563

color8  #474747
color9  #9c6363
color10 #8f9d85
color11 #b99b88
color12 #6e7f96
color13 #baa0a7
color14 #98a9a7
color15 #9A8F8A

enable_audio_bell       no
confirm_os_window_close 0

map kitty_mod+i launch --type=overlay-main /bin/sh -c 'tmux new-session -As "Dotfiles" tmux-sessionizer ~/.config/dotfiles/dotfiles/'
map kitty_mod+n launch --type=overlay-main /bin/sh -c 'tmux new-session -As "Notes" tmux-sessionizer /media/storage/development/notes/'
map kitty_mod+m launch --type=overlay-main /bin/sh -c 'tmux new-session -As "Maya" tmux-sessionizer /media/storage/development/maya/'
map kitty_mod+u launch --type=overlay-main /bin/sh -c 'tmux new-session -As "Unity" tmux-sessionizer /media/storage/development/unity/projects/'
