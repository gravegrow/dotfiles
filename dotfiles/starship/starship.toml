"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$directory\
$git_branch\
$git_commit\
$git_sate\
$python\
$c\
$cpp\
$dotnet\
$lua
$sudo$jobs$status$character"""

add_newline = false
scan_timeout = 120
command_timeout = 2000

[fill]
symbol = '‚ï¥'

[status]
format = '[\[$status\] ]($style)'
style = 'red'
disabled = false

[sudo]
disabled = false
style = 'yellow'
format = '[$symbol ]($style)'
symbol = 'Û±¶ö'

[character]
success_symbol = '[‚ùØ](bold white)'

[jobs]
symbol = 'Û±Å§'

[directory]
truncation_length = 4
read_only = "Û∞¶ù "
style = 'bold blue'
format = '[$read_only]($read_only_style)[ÔÅº $path]($style)'

[git_branch]
format = ' [‚û§](bold white) [$symbol$branch(:$remote_branch)]($style)'
style = "bold green"

[git_commit]
format = ' [\($hash$tag\)]($style)'
style = "red"

[python]
format = ' [‚û§](bold white) [${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "Óúº"

[dotnet]
style = 'blue'
format = ' [‚û§](bold white) [$symbol ($version )($tfm )]($style)'
version_format = 'v${major}.${minor}'
symbol = 'Óôà'

[c]
style = 'blue'
commands = [ [ 'clang', '--version' ], [ 'cc', '--version' ], [ 'gcc', '--version' ] ]
format = ' [‚û§](bold black) [$symbol $name $version]($style)'
version_format = 'v${major}.${minor}'
symbol = 'Óòû'

[cpp]
style = 'blue'
disabled = false
commands = [ [ 'clang++', '--version' ], [ 'c++', '--version' ], [ 'g++', '--version' ] ]
format = ' [‚û§](bold black) [$symbol $name $version]($style)'
version_format = 'v${major}.${minor}'
symbol = 'Óòù'

[lua]
format = ' [‚û§](bold white) [$symbol ($version )]($style)'
version_format = 'v${major}.${minor}'
symbol = 'Óò†'
